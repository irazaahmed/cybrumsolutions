<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cybrum Solutions - Visiting Card (Light Theme)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* Standard visiting card: 89mm x 51mm, one page per side. */
  @page { size: 89mm 51mm; margin: 0; }

  :root {
    --bg: #ffffff;
    --panel: #eef4fc;
    --border: #dbe3f0;
    --accent: #1773d6;
    --accent-deep: #1565c0;
    --accent-soft: #6aa5e6;
    --accent-bright: #2f8ff0;
    --ink: #101727;
    --muted: #54607a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { font-family: "Inter", sans-serif; background: #9aa7bd; }

  .card {
    position: relative;
    width: 89mm;
    height: 51mm;
    background: var(--bg);
    overflow: hidden;
    page-break-after: always;
  }
  /* On-screen preview only: spacing + shadow (removed in print). */
  @media screen {
    body { display: flex; flex-direction: column; align-items: center; gap: 10mm; padding: 10mm; }
    .card { box-shadow: 0 6px 30px rgba(16, 23, 39, 0.35); border-radius: 2.5mm; }
  }

  /* Faint brand grid, both sides */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(23, 115, 214, 0.055) 0.25mm, transparent 0.25mm),
      linear-gradient(to bottom, rgba(23, 115, 214, 0.055) 0.25mm, transparent 0.25mm);
    background-size: 4.4mm 4.4mm;
  }

  /* ------------------------------------------------ FRONT */
  .front .sweep {
    position: absolute; top: -18mm; right: -16mm;
    width: 52mm; height: 52mm; border-radius: 50%;
    background: radial-gradient(circle, rgba(47, 143, 240, 0.28) 0%, rgba(23, 115, 214, 0.10) 52%, transparent 72%);
  }
  .front .ribbon {
    position: absolute; left: 0; bottom: 0; width: 100%; height: 13mm;
    background: linear-gradient(120deg, var(--accent-deep) 0%, var(--accent) 45%, var(--accent-bright) 100%);
    clip-path: polygon(0 34%, 100% 78%, 100% 100%, 0 100%);
  }
  .front .ribbon-soft {
    position: absolute; left: 0; bottom: 0; width: 100%; height: 16mm;
    background: linear-gradient(120deg, rgba(106, 165, 230, 0.55), rgba(47, 143, 240, 0.35));
    clip-path: polygon(0 55%, 100% 12%, 100% 34%, 0 78%);
  }
  .front .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-bottom: 6mm; text-align: center;
  }
  .front img.logo { width: 13.5mm; height: 13.5mm; object-fit: contain; }
  .front .wordmark {
    margin-top: 2.6mm;
    font-family: "Space Grotesk", sans-serif;
    font-size: 17.5pt; font-weight: 700; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .front .wordmark span { color: var(--accent); }
  .front .tagline {
    margin-top: 1.6mm;
    display: flex; align-items: center; gap: 1.8mm;
    font-size: 5.6pt; font-weight: 600; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--muted);
  }
  .front .tagline::before, .front .tagline::after {
    content: ""; width: 6mm; height: 0.35mm;
    background: linear-gradient(to right, transparent, var(--accent-soft));
  }
  .front .tagline::after { background: linear-gradient(to left, transparent, var(--accent-soft)); }
  .front .site {
    position: absolute; bottom: 2.6mm; width: 100%; text-align: center;
    font-size: 6.2pt; font-weight: 600; letter-spacing: 0.14em; color: #ffffff;
  }

  /* ------------------------------------------------ BACK */
  .back .topbar {
    position: absolute; top: 0; left: 0; width: 100%; height: 1.7mm;
    background: linear-gradient(to right, var(--accent-deep), var(--accent), var(--accent-bright));
  }
  .back .brandrow {
    position: absolute; top: 4mm; left: 6mm;
    display: flex; align-items: center; gap: 1.8mm;
  }
  .back .brandrow img { width: 5.6mm; height: 5.6mm; object-fit: contain; }
  .back .brandrow .name {
    font-family: "Space Grotesk", sans-serif;
    font-size: 8.6pt; font-weight: 600; color: var(--ink); letter-spacing: -0.01em;
  }
  .back .brandrow .name span { color: var(--accent); }

  .back .person { position: absolute; top: 13.2mm; left: 6mm; }
  .back .person .who {
    font-family: "Space Grotesk", sans-serif;
    font-size: 13.5pt; font-weight: 700; color: var(--ink); letter-spacing: -0.015em;
  }
  .back .person .role {
    margin-top: 0.8mm;
    font-size: 6.4pt; font-weight: 600; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--accent);
  }
  .back .person .rule {
    margin-top: 1.8mm; width: 12mm; height: 0.5mm; border-radius: 1mm;
    background: linear-gradient(to right, var(--accent), var(--accent-soft));
  }

  .back .contacts {
    position: absolute; left: 6mm; bottom: 4.6mm;
    display: flex; flex-direction: column; gap: 1.55mm;
  }
  .back .contacts .row { display: flex; align-items: center; gap: 1.7mm; }
  .back .contacts .ico {
    width: 3.7mm; height: 3.7mm; border-radius: 1.1mm;
    background: var(--panel); border: 0.2mm solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
  }
  .back .contacts .ico svg { width: 2.2mm; height: 2.2mm; }
  .back .contacts .txt { font-size: 6.6pt; font-weight: 500; color: var(--ink); letter-spacing: 0.01em; }
  .back .contacts .txt b { font-weight: 600; color: var(--accent-deep); }

  .back .qrpanel {
    position: absolute; top: 0; right: 0; width: 27mm; height: 100%;
    background: linear-gradient(200deg, var(--panel) 0%, #e2edfb 100%);
    border-left: 0.25mm solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.6mm;
  }
  .back .qrpanel::after {
    content: ""; position: absolute; left: 0; bottom: 0; width: 100%; height: 8mm;
    background: linear-gradient(120deg, var(--accent-deep), var(--accent-bright));
    clip-path: polygon(0 62%, 100% 20%, 100% 100%, 0 100%);
  }
  .back .qrbox {
    background: #ffffff; padding: 1.6mm; border-radius: 1.8mm;
    border: 0.25mm solid var(--border);
    box-shadow: 0 1mm 2.5mm rgba(16, 23, 39, 0.08);
  }
  .back .qrbox img { width: 16.5mm; height: 16.5mm; display: block; }
  .back .qrcap {
    font-size: 4.4pt; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted); text-align: center;
    white-space: nowrap;
  }
  /* PNG export mode (?p=all or ?p=N): flat rendering, no preview chrome. */
  html.export body { display: block; padding: 0; margin: 0; background: #ffffff; }
  html.export .card { box-shadow: none; border-radius: 0; }
  html.export .card + .card { margin-top: 3mm; }
</style>
<script>
  // ?p=N shows only side N; ?p=all shows both, flush, for PNG export.
  (function () {
    var p = new URLSearchParams(location.search).get("p");
    if (p === null) return;
    document.documentElement.classList.add("export");
    addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("body > section").forEach(function (el, i) {
        if (p !== "all" && String(i + 1) !== p) el.style.display = "none";
      });
    });
  })();
</script>
</head>
<body>

  <!-- FRONT -->
  <section class="card front">
    <div class="grid"></div>
    <div class="sweep"></div>
    <div class="ribbon-soft"></div>
    <div class="ribbon"></div>
    <div class="center">
      <img class="logo" src="../../public/logo-light-theme.png" alt="Cybrum Solutions logo" />
      <div class="wordmark">Cybrum <span>Solutions</span></div>
      <div class="tagline">One element. Every solution.</div>
    </div>
    <div class="site">www.cybrumsolutions.dev</div>
  </section>

  <!-- BACK -->
  <section class="card back">
    <div class="grid"></div>
    <div class="topbar"></div>

    <div class="brandrow">
      <img src="../../public/logo-light-theme.png" alt="" />
      <div class="name">Cybrum <span>Solutions</span></div>
    </div>

    <div class="person">
      <div class="who">Ahmed Raza</div>
      <div class="role">Founder &amp; CEO</div>
      <div class="rule"></div>
    </div>

    <div class="contacts">
      <div class="row">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </span>
        <span class="txt">0337-0<b>(292786)</b> CYBRUM</span>
      </div>
      <div class="row">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <span class="txt">info@cybrumsolutions.dev</span>
      </div>
      <div class="row">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        </span>
        <span class="txt">www.cybrumsolutions.dev</span>
      </div>
      <div class="row">
        <span class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
        </span>
        <span class="txt">Karachi, Pakistan</span>
      </div>
    </div>

    <div class="qrpanel">
      <div class="qrbox"><img src="card-qr.svg" alt="WhatsApp QR code" /></div>
      <div class="qrcap">Scan to chat on WhatsApp</div>
    </div>
  </section>

</body>
</html>
